<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM - Browser Object Model</title>
</head>
<body>
    
    <h1>Browser Object Model (BOM)</h1>

    <h3>1. Screen Size</h3>
    <button onclick="getScreenSize()">Get Screen Size</button>
    <p id="screenResult"></p>

    <h3>2. Browser Info</h3>
    <button onclick="getBrowserInfo()">Get Broswer Info</button>
    <p id="browserResult"></p>

    <h3>3. Redirect After 3 Seconds</h3>
    <button onclick="redirectPage()">Redirect</button>

    <h3>4. Navigation</h3>
    <button onclick="goBack()">Go Back</button>
    <button onclick="goForward()">Go Forward</button>

    <script src="./script.js"></script>

</body>
</html>
